name: Release

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write
  id-token: write
  pull-requests: read

jobs:
  release:
    if: >-
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Check
        run: bun run check
      - name: Test
        run: bun run test
      - name: Build
        run: bun run build
      - name: Ensure version is unpublished
        run: |
          if npm view "import-tanstack-intent@${{ steps.version.outputs.version }}" version --json >/dev/null 2>&1; then
            echo "import-tanstack-intent@${{ steps.version.outputs.version }} is already published."
            exit 1
          fi
      - name: Publish to npm
        run: npm publish
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --target "${{ github.event.pull_request.merge_commit_sha }}" \
            --generate-notes
